<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGSI Bypass Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
            margin-top: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .badge {
            background: #667eea;
            color: white;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .service-btn {
            padding: 12px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }

        .service-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .service-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .service-btn .icon {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .service-btn .sub {
            font-size: 9px;
            opacity: 0.6;
            display: block;
            margin-top: 2px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .input-field {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .input-field::placeholder {
            color: #666;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: #28a745;
            border-color: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-original {
            background: #6c757d;
            border-color: #6c757d;
        }

        .btn-original:hover {
            background: #5a6268;
        }

        #resultArea {
            margin-top: 20px;
            display: none;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #28a745;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: white;
        }

        .result-content {
            word-break: break-all;
            color: #ddd;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-family: monospace;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .result-error {
            border-left-color: #dc3545;
        }

        .result-error .result-header span {
            color: #dc3545;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p {
            color: #aaa;
        }

        .history-section {
            margin-top: 10px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h3 {
            color: white;
            font-size: 16px;
        }

        .btn-clear {
            padding: 4px 14px;
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        #historyList {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        #historyList li {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-link {
            color: #667eea;
            text-decoration: none;
            flex: 1;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-link:hover {
            text-decoration: underline;
        }

        .history-service {
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .history-delete {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }

        .history-delete:hover {
            color: #ff0000;
        }

        .empty-history {
            color: #666;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }

        .auto-detect {
            color: #667eea;
            font-size: 12px;
            margin-top: 8px;
            padding: 8px 14px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            display: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }

            .service-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .input-group {
                flex-direction: column;
            }

            .btn-primary {
                width: 100%;
                justify-content: center;
            }

            .header h1 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .service-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .service-btn {
                font-size: 11px;
                padding: 10px 6px;
            }

            .service-btn .icon {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ FGSI Bypass Tools</h1>
            <p>Bypass berbagai shortlink dengan mudah</p>
        </div>

        <div class="card">
            <div class="card-title">
                🔗 Pilih Metode Skip
                <span class="badge">8 Metode</span>
            </div>

            <div class="service-grid" id="serviceGrid">
                <button class="service-btn active" data-service="tutwuri">
                    <span class="icon">🌐</span>
                    Tutwuri/SFL
                </button>
                <button class="service-btn" data-service="adlinksumo">
                    <span class="icon">📢</span>
                    AdLinkSumo
                </button>
                <button class="service-btn" data-service="droplink">
                    <span class="icon">🔽</span>
                    Droplink
                </button>
                <button class="service-btn" data-service="linkvertise">
                    <span class="icon">🔗</span>
                    Linkvertise
                </button>
                <button class="service-btn" data-service="ouo">
                    <span class="icon">📎</span>
                    Ouo.io
                </button>
                <button class="service-btn" data-service="shortig">
                    <span class="icon">⚡</span>
                    Shortig
                </button>
                <button class="service-btn" data-service="shortxlinks">
                    <span class="icon">🔀</span>
                    ShortXLinks
                </button>
                <button class="service-btn" data-service="sub4unlock">
                    <span class="icon">🔓</span>
                    Sub4Unlock
                    <span class="sub">co/com/id/io</span>
                </button>
            </div>

            <div class="input-group">
                <input type="url" id="urlInput" placeholder="Masukkan URL target (contoh: https://sfl.gl/xxxxx)" class="input-field">
                <button id="bypassBtn" class="btn-primary">⚡ Bypass</button>
            </div>

            <div id="autoDetect" class="auto-detect">
                🔍 Mendeteksi metode otomatis: <span id="detectedService"></span>
            </div>

            <div id="loading">
                <div class="spinner"></div>
                <p>Memproses bypass...</p>
            </div>

            <div id="resultArea">
                <div class="result-card">
                    <div class="result-header">
                        <span id="resultTitle">✅ Hasil Bypass</span>
                        <span id="resultService" style="font-size:12px;color:#667eea;"></span>
                    </div>
                    <div id="resultContent" class="result-content"></div>
                    <div class="result-actions">
                        <button id="copyBtn" class="btn-secondary">📋 Copy</button>
                        <a id="resultLink" href="#" target="_blank" class="btn-secondary btn-success">🌍 Buka Link</a>
                        <button id="showOriginalBtn" class="btn-secondary btn-original" style="display:none;">📄 Lihat Original</button>
                    </div>
                    <div id="originalUrlDisplay" style="display:none;margin-top:10px;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px;color:#888;font-size:12px;word-break:break-all;">
                        <strong>URL Original:</strong> <span id="originalUrlText"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="history-section">
                <div class="history-header">
                    <h3>📜 Riwayat Bypass</h3>
                    <button id="clearHistoryBtn" class="btn-clear">🗑️ Hapus Semua</button>
                </div>
                <ul id="historyList"></ul>
            </div>
        </div>

        <div style="text-align:center;color:#555;font-size:12px;padding:20px 0;">
            Powered by FGSI RestAPIs • Data tersimpan di lokal browser
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI API
        // ============================================================
        const API_CONFIG = {
            tutwuri: {
                name: 'Tutwuri/SFL',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/tutwuri',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['sfl.gl', 'tutwuri.com', 'tutwuri.id']
            },
            adlinksumo: {
                name: 'AdLinkSumo',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/adlinksumo',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['adlinksumo.com', 'kalimbachords.net']
            },
            droplink: {
                name: 'Droplink',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/droplink',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['droplink.co']
            },
            linkvertise: {
                name: 'Linkvertise',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/linkvertise',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['linkvertise.com']
            },
            ouo: {
                name: 'Ouo.io',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/ouo',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['ouo.io']
            },
            shortig: {
                name: 'Shortig',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/shortig',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['shortig.com']
            },
            shortxlinks: {
                name: 'ShortXLinks',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/shortxlinks',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['shortxlinks.in']
            },
            sub4unlock: {
                name: 'Sub4Unlock',
                endpoint: 'https://fgsi.dpdns.org/api/tools/skip/sub4unlock',
                apikey: 'fgsiapi-19ddf32a-6d',
                domains: ['sub4unlock.com', 'sub4unlock.co', 'sub4unlock.id', 'sub4unlock.io']
            }
        };

        // ============================================================
        // STATE
        // ============================================================
        let currentService = 'tutwuri';
        let history = JSON.parse(localStorage.getItem('fgsi_history') || '[]');
        let lastOriginalUrl = '';

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const urlInput = document.getElementById('urlInput');
        const bypassBtn = document.getElementById('bypassBtn');
        const resultArea = document.getElementById('resultArea');
        const resultContent = document.getElementById('resultContent');
        const resultLink = document.getElementById('resultLink');
        const resultTitle = document.getElementById('resultTitle');
        const resultService = document.getElementById('resultService');
        const copyBtn = document.getElementById('copyBtn');
        const loading = document.getElementById('loading');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const showOriginalBtn = document.getElementById('showOriginalBtn');
        const originalUrlDisplay = document.getElementById('originalUrlDisplay');
        const originalUrlText = document.getElementById('originalUrlText');
        const autoDetect = document.getElementById('autoDetect');
        const detectedService = document.getElementById('detectedService');

        // ============================================================
        // SERVICE SELECTOR
        // ============================================================
        document.querySelectorAll('.service-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentService = this.dataset.service;
                urlInput.placeholder = `Masukkan URL untuk ${API_CONFIG[currentService].name}...`;
                resultArea.style.display = 'none';
                autoDetect.style.display = 'none';
            });
        });

        // ============================================================
        // AUTO DETECT DOMAIN
        // ============================================================
        function detectService(url) {
            try {
                const urlObj = new URL(url);
                const hostname = urlObj.hostname.toLowerCase();
                
                for (const [key, config] of Object.entries(API_CONFIG)) {
                    for (const domain of config.domains) {
                        if (hostname.includes(domain) || domain.includes(hostname)) {
                            return key;
                        }
                    }
                }
                return null;
            } catch {
                return null;
            }
        }

        urlInput.addEventListener('input', function() {
            const url = this.value.trim();
            if (url) {
                const detected = detectService(url);
                if (detected && detected !== currentService) {
                    autoDetect.style.display = 'block';
                    detectedService.textContent = API_CONFIG[detected].name;
                    detectedService.style.color = '#28a745';
                } else if (detected === currentService) {
                    autoDetect.style.display = 'block';
                    detectedService.textContent = API_CONFIG[detected].name + ' ✅';
                    detectedService.style.color = '#28a745';
                } else {
                    autoDetect.style.display = 'none';
                }
            } else {
                autoDetect.style.display = 'none';
            }
        });

        // ============================================================
        // BYPASS FUNCTION
        // ============================================================
        async function bypassUrl() {
            const url = urlInput.value.trim();
            if (!url) {
                alert('⚠️ Silakan masukkan URL terlebih dahulu!');
                return;
            }

            try {
                new URL(url);
            } catch {
                alert('⚠️ URL tidak valid! Pastikan diawali dengan http:// atau https://');
                return;
            }

            // Auto detect dan switch service
            const detected = detectService(url);
            let serviceToUse = currentService;
            if (detected) {
                serviceToUse = detected;
                // Highlight tombol yang sesuai
                document.querySelectorAll('.service-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.service === detected);
                });
            }

            loading.style.display = 'block';
            resultArea.style.display = 'none';
            bypassBtn.disabled = true;

            try {
                const config = API_CONFIG[serviceToUse];
                if (!config) throw new Error('Service tidak ditemukan');

                const apiUrl = `${config.endpoint}?apikey=${config.apikey}&url=${encodeURIComponent(url)}`;
                
                console.log(`📡 [${config.name}] Request ke:`, apiUrl);
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errorData = await response.json();
                        if (errorData.message) errorMsg += `: ${errorData.message}`;
                    } catch {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                console.log('📦 Response:', data);

                if (data.status === false) {
                    throw new Error(data.message || data.data?.message || 'Gagal bypass link!');
                }

                displayResult(data, url, config.name);
                saveHistory(url, data, config.name);

            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            } finally {
                loading.style.display = 'none';
                bypassBtn.disabled = false;
            }
        }

        // ============================================================
        // SHOW ERROR
        // ============================================================
        function showError(message) {
            resultArea.style.display = 'block';
            const card = document.querySelector('.result-card');
            card.classList.add('result-error');
            
            resultTitle.textContent = '❌ Error';
            resultService.textContent = '';
            resultContent.textContent = message;
            resultLink.style.display = 'none';
            showOriginalBtn.style.display = 'none';
            originalUrlDisplay.style.display = 'none';
            copyBtn.textContent = '📋 Copy Error';
            
            setTimeout(() => {
                card.classList.remove('result-error');
                copyBtn.textContent = '📋 Copy';
            }, 5000);
        }

        // ============================================================
        // DISPLAY RESULT
        // ============================================================
        function displayResult(data, originalUrl, serviceName) {
            resultArea.style.display = 'block';
            document.querySelector('.result-card').classList.remove('result-error');
            
            let shortUrl = '#';
            let resultText = '';
            let originalLink = originalUrl;

            // Parse response
            if (data && data.status === true && data.data) {
                if (data.data.url) {
                    shortUrl = data.data.url;
                    resultText = data.data.url;
                }
                if (data.data.original) {
                    originalLink = data.data.original;
                }
                if (data.data.message && !resultText) {
                    resultText = data.data.message;
                }
            } else if (typeof data === 'string') {
                resultText = data;
                shortUrl = data;
            } else if (data.short_url || data.shortUrl) {
                shortUrl = data.short_url || data.shortUrl;
                resultText = shortUrl;
            } else if (data.result) {
                resultText = data.result;
                shortUrl = data.result;
            } else if (data.url) {
                shortUrl = data.url;
                resultText = data.url;
            } else {
                resultText = JSON.stringify(data, null, 2);
                shortUrl = '#';
            }

            // Validasi URL hasil
            if (shortUrl && !shortUrl.startsWith('http') && shortUrl !== '#') {
                shortUrl = 'https://' + shortUrl;
            }

            resultContent.textContent = resultText;
            resultLink.href = shortUrl;
            resultLink.target = '_blank';
            
            lastOriginalUrl = originalLink;
            resultTitle.textContent = '✅ Hasil Bypass';
            resultService.textContent = `via ${serviceName}`;
            
            if (originalLink && originalLink !== shortUrl && originalLink !== '#') {
                showOriginalBtn.style.display = 'inline-block';
                originalUrlText.textContent = originalLink;
            } else {
                showOriginalBtn.style.display = 'none';
                originalUrlDisplay.style.display = 'none';
            }
            
            if (shortUrl === '#' || shortUrl === '') {
                resultLink.style.display = 'none';
            } else {
                resultLink.style.display = 'inline-block';
            }

            copyBtn.textContent = '📋 Copy';
        }

        // ============================================================
        // SHOW ORIGINAL URL
        // ============================================================
        showOriginalBtn.addEventListener('click', function() {
            if (originalUrlDisplay.style.display === 'none') {
                originalUrlDisplay.style.display = 'block';
                showOriginalBtn.textContent = '🙈 Sembunyikan Original';
            } else {
                originalUrlDisplay.style.display = 'none';
                showOriginalBtn.textContent = '📄 Lihat Original';
            }
        });

        // ============================================================
        // SAVE HISTORY
        // ============================================================
        function saveHistory(originalUrl, data, serviceName) {
            let shortUrl = '#';
            
            if (data && data.status === true && data.data && data.data.url) {
                shortUrl = data.data.url;
            } else if (typeof data === 'string') {
                shortUrl = data;
            } else if (data.short_url || data.shortUrl) {
                shortUrl = data.short_url || data.shortUrl;
            } else if (data.result) {
                shortUrl = data.result;
            } else if (data.url) {
                shortUrl = data.url;
            }

            if (shortUrl && !shortUrl.startsWith('http') && shortUrl !== '#') {
                shortUrl = 'https://' + shortUrl;
            }

            history.unshift({
                original: originalUrl,
                short: shortUrl,
                service: serviceName,
                timestamp: new Date().toLocaleString('id-ID')
            });

            if (history.length > 50) history = history.slice(0, 50);
            
            localStorage.setItem('fgsi_history', JSON.stringify(history));
            renderHistory();
        }

        // ============================================================
        // RENDER HISTORY
        // ============================================================
        function renderHistory() {
            historyList.innerHTML = '';
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty-history">Belum ada riwayat bypass</li>';
                return;
            }
            
            history.forEach((item, index) => {
                const li = document.createElement('li');
                const shortLink = item.short && item.short !== '#' ? item.short : '#';
                li.innerHTML = `
                    <a href="${shortLink}" target="_blank" class="history-link" title="${item.original}">
                        ${item.original.length > 45 ? item.original.substring(0, 45) + '...' : item.original}
                    </a>
                    <span class="history-service">${item.service}</span>
                    <button class="history-delete" onclick="deleteHistory(${index})" title="Hapus">×</button>
                `;
                historyList.appendChild(li);
            });
        }

        window.deleteHistory = function(index) {
            history.splice(index, 1);
            localStorage.setItem('fgsi_history', JSON.stringify(history));
            renderHistory();
        };

        clearHistoryBtn.addEventListener('click', function() {
            if (confirm('⚠️ Yakin ingin menghapus semua riwayat?')) {
                history = [];
                localStorage.setItem('fgsi_history', JSON.stringify(history));
                renderHistory();
            }
        });

        // ============================================================
        // COPY
        // ============================================================
        copyBtn.addEventListener('click', function() {
            const text = resultContent.textContent;
            if (!text || text === '#') {
                alert('Tidak ada link untuk disalin!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
            });
        });

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') bypassUrl();
        });

        bypassBtn.addEventListener('click', bypassUrl);

        // ============================================================
        // INIT
        // ============================================================
        renderHistory();
        urlInput.placeholder = `Masukkan URL untuk ${API_CONFIG.tutwuri.name}...`;

        console.log('🚀 FGSI Bypass Tools Loaded!');
        console.log(`📊 ${Object.keys(API_CONFIG).length} metode skip tersedia`);
        console.log(`📜 ${history.length} riwayat tersimpan`);
    </script>
</body>
</html>
